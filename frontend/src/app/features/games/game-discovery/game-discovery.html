<div class="dashboard-wrapper">
  <!-- Sidebar Navigation -->
  <nav class="glass-navbar">
    <div class="logo">
      <img src="/logo.png" alt="Game Library Logo" class="sidebar-logo">
    </div>
    <div class="nav-links">
      <a routerLink="/collection">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Minha Coleção
      </a>
      <a routerLink="/games" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
        Descobrir
      </a>
      <button (click)="logout()" class="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sair
      </button>
    </div>
  </nav>

  <main class="dashboard-content">
    <div class="header-section">
      <h1>Descubra Novos Games</h1>
      <p>Pesquise no vasto banco de dados e adicione jogos à sua coleção.</p>
    </div>

    <div class="search-bar">
      <input type="text" [(ngModel)]="searchQuery" (input)="onSearchInput($event)" (keyup.enter)="search()"
        placeholder="Pesquise por um jogo (ex: Witcher 3, Cyberpunk...)">
      <button (click)="search()">Pesquisar</button>
    </div>

    <div class="loader-container" *ngIf="isLoading">
      <div class="loader"></div>
    </div>

    <div class="collection-grid" *ngIf="!isLoading && games && games.length > 0">
      <div class="game-card glass-card" *ngFor="let game of games">
        <div class="card-image" [style.backgroundImage]="'url(' + (game.imageUrl || game.background_image) + ')'">
        </div>
        <div class="card-content">
          <h3 [title]="game.name || game.title">{{ game.name || game.title }}</h3>
          <p class="release-date">Lançamento: {{ (game.released || game.releaseDate) | date }}</p>

          <button
            [disabled]="addedGames.has(game.externalId || game.id || 0) || addingGames.has(game.externalId || game.id || 0)"
            class="btn-add" (click)="addToCollection(game)">
            <span *ngIf="addingGames.has(game.externalId || game.id || 0)">Adicionando...</span>
            <span
              *ngIf="!addingGames.has(game.externalId || game.id || 0) && !addedGames.has(game.externalId || game.id || 0)">Adicionar
              à Coleção</span>
            <span *ngIf="addedGames.has(game.externalId || game.id || 0)">Adicionado ✓</span>
          </button>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="!isLoading && (!games || games.length === 0)">
      <h3>Nenhum jogo encontrado</h3>
      <p>Tente pesquisar com palavras-chave diferentes.</p>
    </div>
  </main>


</div>
