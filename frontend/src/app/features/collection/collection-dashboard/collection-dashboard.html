<div class="dashboard-wrapper">
  <!-- Sidebar Navigation -->
  <nav class="glass-navbar">
    <div class="logo">
      <img src="/logo.png" alt="Game Library Logo" class="sidebar-logo">
    </div>
    <div class="nav-links">
      <a routerLink="/collection" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Minha Coleção
      </a>
      <a routerLink="/games">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
        Descobrir
      </a>
      <button (click)="logout()" class="btn-logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sair
      </button>
    </div>
  </nav>

  <main class="dashboard-content">
    <div class="header-section">
      <h1>Seu Universo de Jogos</h1>
      <p>Gerencie e acompanhe todos os jogos que você ama.</p>
    </div>

    <div class="collection-grid" *ngIf="collection$ | async as collection; else loading">
      <div class="empty-state" *ngIf="collection.length === 0">
        <h3>Sua coleção está vazia</h3>
        <p>Vá para <a routerLink="/games">Descobrir</a> para adicionar alguns jogos.</p>
      </div>

      <div class="game-card glass-card" *ngFor="let item of collection">
        <div class="card-image" [style.backgroundImage]="'url(' + item.backgroundImage + ')'">
        </div>
        <div class="card-content">
          <h3>{{ item.name }}</h3>
          <p class="release-date">Avaliação: {{ item.rating }}</p>
        </div>
      </div>
    </div>

    <ng-template #loading>
      <div class="loader-container">
        <div class="loader"></div>
      </div>
    </ng-template>
  </main>
  

</div>
